name: Scheduled Acceptance Tests (Linux)

permissions:
  id-token: write
  contents: read
  checks: write

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Linux tests
        run: set -o pipefail && npx vitest run examples/*.test.mjs 2>&1 | tee test-output.log
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: test-report.junit.xml
          retention-days: 30

      - name: Upload test output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-linux
          path: test-output.log
          retention-days: 30

  sentry-and-publish:
    needs: test-linux
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Install Sentry CLI
        run: npm install -g @sentry/cli

      - name: Report to Sentry Cron
        continue-on-error: true
        run: |
          if [ "${{ needs.test-linux.result }}" == "success" ]; then
            sentry-cli monitors run testdriver-linux-acceptance -- echo "Linux tests passed"
          else
            sentry-cli monitors run testdriver-linux-acceptance -- bash -c "echo 'Linux tests failed' && exit 1"
          fi
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-linux

      - name: Upload test results to Sentry Prevent
        if: ${{ !cancelled() }}
        uses: getsentry/prevent-action@v0
        with:
          token: ${{ secrets.SENTRY_PREVENT_TOKEN }}

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-report.junit.xml
          check_name: Test Results (Linux Scheduled)
