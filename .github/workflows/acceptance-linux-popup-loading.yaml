name: Flake Acceptance Tests (Linux)

permissions:
  id-token: write
  contents: read

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  popup-loading:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # redraw=true, cache=true
          - run_id: 1
            redraw: "true"
            cache: "true"
          - run_id: 2
            redraw: "true"
            cache: "true"
          # redraw=true, cache=false
          - run_id: 3
            redraw: "true"
            cache: "false"
          - run_id: 4
            redraw: "true"
            cache: "false"
          # redraw=false, cache=true
          - run_id: 5
            redraw: "false"
            cache: "true"
          - run_id: 6
            redraw: "false"
            cache: "true"
          # redraw=false, cache=false
          - run_id: 7
            redraw: "false"
            cache: "false"
          - run_id: 8
            redraw: "false"
            cache: "false"
          # redraw with custom diffThreshold, cache=true
          - run_id: 9
            redraw: '{"enabled":true,"diffThreshold":0.01}'
            cache: "true"
          # redraw with custom diffThreshold, cache=false
          - run_id: 10
            redraw: '{"enabled":true,"diffThreshold":0.1}'
            cache: "false"
          # redraw with high diffThreshold
          - run_id: 11
            redraw: '{"enabled":true,"diffThreshold":0.5}'
            cache: "true"

    name: "popup-loading (#${{ matrix.run_id }} redraw=${{ matrix.redraw }} cache=${{ matrix.cache }})"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run popup-loading test
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: ${{ matrix.redraw }}
          TD_CACHE: ${{ matrix.cache }}
