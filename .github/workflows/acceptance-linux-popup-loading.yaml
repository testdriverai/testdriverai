name: Flake Acceptance Tests (Linux)

permissions:
  id-token: write
  contents: read

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  popup-loading:
    runs-on: ubuntu-latest
    name: "popup-loading (sequential, 11 runs)"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: "#1 redraw=true cache=true"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "true"
          TD_CACHE: "true"

      - name: "#2 redraw=true cache=true"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "true"
          TD_CACHE: "true"

      - name: "#3 redraw=true cache=false"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "true"
          TD_CACHE: "false"

      - name: "#4 redraw=true cache=false"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "true"
          TD_CACHE: "false"

      - name: "#5 redraw=false cache=true"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "false"
          TD_CACHE: "true"

      - name: "#6 redraw=false cache=true"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "false"
          TD_CACHE: "true"

      - name: "#7 redraw=false cache=false"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "false"
          TD_CACHE: "false"

      - name: "#8 redraw=false cache=false"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: "false"
          TD_CACHE: "false"

      - name: "#9 redraw=diffThreshold:0.01 cache=true"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: '{"enabled":true,"diffThreshold":0.01}'
          TD_CACHE: "true"

      - name: "#10 redraw=diffThreshold:0.1 cache=false"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: '{"enabled":true,"diffThreshold":0.1}'
          TD_CACHE: "false"

      - name: "#11 redraw=diffThreshold:0.5 cache=true"
        run: npx vitest run examples/popup-loading.test.mjs --reporter=dot
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          TD_OS: linux
          TD_REDRAW: '{"enabled":true,"diffThreshold":0.5}'
          TD_CACHE: "true"
